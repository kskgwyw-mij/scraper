<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Willhaben Scraper{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
</head>
<body>
  <nav class="navbar">
    <a href="{{ url_for('main.index') }}" class="navbar-brand">🔍 Willhaben Scraper</a>
    <div class="navbar-links">
      <a href="{{ url_for('scraper.catalog') }}" class="navbar-link">📚 Katalog</a>
    </div>
  </nav>

  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>Willhaben Scraper &amp; Price Predictor</p>
  </footer>
</body>
</html>
